<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="#0f172a"/>

  <!-- Beam / light rays -->
  <path d="M 260 340 L 780 390 L 780 560 L 260 510 Z" fill="#3b82f6" opacity="0.12"/>
  <path d="M 260 360 L 820 410 L 820 540 L 260 490 Z" fill="#3b82f6" opacity="0.08"/>

  <!-- Screen outline -->
  <rect x="240" y="240" width="544" height="380" rx="24" ry="24" fill="#1e293b"/>
  <rect x="240" y="240" width="544" height="380" rx="24" ry="24" fill="none" stroke="#3b82f6" stroke-width="8"/>

  <!-- Screen inner -->
  <rect x="264" y="264" width="496" height="332" rx="12" ry="12" fill="#0f172a"/>

  <!-- Play triangle -->
  <polygon points="448,360 448,500 572,430" fill="#3b82f6"/>

  <!-- Recording dot glow -->
  <circle cx="308" cy="308" r="20" fill="#ef4444" opacity="0.3"/>
  <circle cx="308" cy="308" r="10" fill="#ef4444"/>

  <!-- Webcam bubble -->
  <circle cx="720" cy="556" r="56" fill="#1e293b" stroke="#3b82f6" stroke-width="5"/>
  <circle cx="720" cy="556" r="22" fill="#3b82f6"/>
  <circle cx="720" cy="556" r="9" fill="#0f172a"/>

  <!-- Stand -->
  <rect x="460" y="624" width="104" height="16" rx="8" fill="#3b82f6" opacity="0.4"/>
  <rect x="408" y="644" width="208" height="12" rx="6" fill="#3b82f6" opacity="0.3"/>

  <!-- BEAM text -->
  <text x="512" y="780" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" letter-spacing="2" fill="#ffffff">BEAM</text>
</svg>
